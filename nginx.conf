server {
  listen 80;

  # ── gzip 압축 ──
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/woff2;

  # ── 보안 헤더 ──
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://tolelom.xyz" always;

  # ── SPA 라우팅 ──
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;

    # index.html은 캐시하지 않음 (항상 최신 버전 제공)
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
  }

  # ── Vite 해시 포함 정적 자원 (JS, CSS) — 장기 캐싱 ──
  location ~* \.(?:js|css)$ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    access_log off;
  }

  # ── 폰트 파일 — 장기 캐싱 ──
  location ~* \.(?:woff2?|ttf|eot|otf)$ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Access-Control-Allow-Origin "*" always;
    access_log off;
  }

  # ── 이미지 — 장기 캐싱 ──
  location ~* \.(?:png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
    root /usr/share/nginx/html;
    expires 6M;
    add_header Cache-Control "public" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
  }
}
