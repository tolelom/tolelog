name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm ci

      - name: 린트
        run: npm run lint

      - name: 테스트 실행 (커버리지 포함)
        run: npx vitest run --coverage

      - name: 커버리지 요약 생성
        if: always()
        run: |
          echo '## Frontend 테스트 커버리지 리포트' > coverage-summary.md
          echo '' >> coverage-summary.md
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const r = require('./coverage/coverage-summary.json');
              const t = r.total;
              const fmt = (m) => m.pct + '%';
              console.log('| 항목 | 커버리지 |');
              console.log('|------|----------|');
              console.log('| Statements | ' + fmt(t.statements) + ' |');
              console.log('| Branches | ' + fmt(t.branches) + ' |');
              console.log('| Functions | ' + fmt(t.functions) + ' |');
              console.log('| Lines | ' + fmt(t.lines) + ' |');
            " >> coverage-summary.md
          else
            echo '커버리지 데이터를 찾을 수 없습니다.' >> coverage-summary.md
          fi

      - name: PR에 커버리지 코멘트
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: frontend-coverage
          path: coverage-summary.md

      - name: 커버리지 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

  build-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm ci

      - name: 빌드
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tolelom/tolelog:latest
            ghcr.io/tolelom/tolelog:main
            ghcr.io/tolelom/tolelog:${{ github.sha }}
          platforms: linux/arm64

